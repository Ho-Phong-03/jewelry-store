<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login For Html Css</title>
<link rel="stylesheet" href="../asset/css/login_form.css">
</head>
<body>
    <div class="login-form">
        <div class="container">
            <div class="main">
                <div class="content">
                    
                    <h2>Đăng Nhập</h2>
                    <form action="#" method="post">
                        <label for="email">Email</label>
                        <input type="email" name="email" placeholder="Email" required autofocus="" id="email">
                        <label for="email">Mật khẩu</label>
                        <input type="password" name="password" placeholder="Mật khẩu" required autofocus="" id="password">

                        <a href="../login-form/forgot_password.html">Quên mật khẩu?</a>

                        <button class="btn" type="submit">
                            Login
                        </button>

                    </form>
                    <p class="account">Bạn chưa có tài khoản? <a href="../login-form/register.html">Register</a></p>
                </div>
                <div class="form-img">
                    <img src="../asset/images/img/bg.png" alt="">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
