<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login For Html Css</title>
<link rel="stylesheet" href="../asset/css/login_form.css">
</head>
<body>
    <div class="login-form">
        <div class="container">
            <div class="main">
                <div class="content">
                    <h2>Đăng Ký</h2>
                    <form action="#" method="post">
                        <label for="name">Tên đăng nhập</label>
                        <input type="text" name="name" placeholder="Tên" required autofocus="" id="name">
                        <label for="email">Email</label>
                        <input type="email" name="email" placeholder="Email" required autofocus="" id="email">
                        <label for="email">Mật khẩu</label>
                        <input type="password" name="password" placeholder="Mật khẩu" required autofocus="" id="password">
                        <label for="email">Nhập lại mật khẩu</label>
                        <input type="password" name="confirmpassword" placeholder="Mật khẩu" required autofocus="" id="confirmpassword">
                        
                        <button class="btn" type="submit">
                            Đăng ký
                        </button>

                    </form>
                    <p class="account">Bạn đã có tài khoản? <a href="../login-form/index.html">Đăng nhập</a></p>
                </div>
                <div class="form-img">
                    <img src="../asset/images/img/bg.png" alt="">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
