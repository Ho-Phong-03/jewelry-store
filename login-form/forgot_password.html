<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login For Html Css</title>
<link rel="stylesheet" href="../asset/css/login_form.css">
</head>
<body>
    <div class="login-form">
        <div class="container">
            <div class="main">
                <div class="content">
                    <h2>Quên Mật Khẩu</h2>
                    <form action="#" method="post">
                        <label for="email">Email</label>
                        <input type="email" name="email" placeholder="Email" required autofocus="" id="email">
                        
                        <button class="btn" type="submit">
                            Khôi phục mật khẩu
                        </button>

                    </form>
                    <p class="account">Bạn đã có tài khoản? <a href="../login-form/index.html">Đăng nhập</a></p>
                </div>
                <div class="form-img">
                    <img src="../asset/images/img/bg.png" alt="">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
